<!DOCTYPE html>
<html>
<head><meta charset="UTF-8"><title>デバッグ</title>
<style>
body{background:#111;color:#fff;padding:20px;font-family:sans-serif;}
.hidden{display:none !important;}
.card{background:#222;border-radius:12px;padding:20px;margin:16px 0;}
.cpcard{border:2px solid #444;border-radius:12px;padding:16px;margin:8px 0;cursor:pointer;transition:all 0.2s;}
.cpcard:hover{border-color:#0179E8;}
.cpcard.on{border-color:#0179E8;background:rgba(1,121,232,0.15);}
.btn{width:100%;padding:14px;border:none;border-radius:10px;font-size:15px;font-weight:700;cursor:pointer;margin-top:12px;}
.btn-gold{background:#D0A900;color:#000;font-size:17px;}
.btn-blue{background:#0179E8;color:#fff;}
#log{background:#000;padding:12px;margin-top:16px;font-size:11px;color:lime;border-radius:8px;max-height:300px;overflow-y:auto;}
</style>
</head>
<body>
<h2>Smartpage-i デバッグ版</h2>
<p style="color:#aaa;font-size:13px;">実際のWorkerAPIを呼んでテストします</p>

<div class="card">
  <button class="btn btn-blue" id="btn_genCopy">✨ コピー生成テスト</button>
</div>

<div class="card hidden" id="sec_copyPats">
  <div id="patList"></div>
</div>

<div class="card hidden" id="sec_genBtn" style="background:rgba(208,169,0,0.1);border:2px solid #D0A900;border-radius:12px;padding:20px;">
  <div style="color:#D0A900;font-weight:700;margin-bottom:12px;">🎉 コピーが決まりました！</div>
  <button class="btn btn-gold" id="btn_genHP">🌐 HP生成する</button>
</div>

<div class="card hidden" id="sec_hpLoad">
  <p style="text-align:center;padding:20px;">⏳ HP生成中...</p>
</div>

<div class="card hidden" id="sec_done">
  <p style="color:#22c55e;font-size:18px;text-align:center;padding:20px;">✅ 完了！</p>
</div>

<div id="log">ログ開始...\n</div>

<script>
var WK="https://smartpage-i-tool.yymmatsu.workers.dev";
var cpData=null;

function L(m){
  var el=document.getElementById('log');
  el.textContent+='\n'+m;
  el.scrollTop=el.scrollHeight;
  console.log(m);
}

function show(id){
  var el=document.getElementById(id);
  el.classList.remove('hidden');
  L('show('+id+') OK - display:'+window.getComputedStyle(el).display);
}
function hide(id){
  document.getElementById(id).classList.add('hidden');
  L('hide('+id+') OK');
}

// btn_genHPを最初に登録
document.getElementById('btn_genHP').addEventListener('click',function(){
  L('★★★ btn_genHP clicked! cpData='+JSON.stringify(cpData));
  if(!cpData){L('ERROR: cpData is null');return;}
  hide('sec_genBtn');
  show('sec_hpLoad');
  setTimeout(function(){
    hide('sec_hpLoad');
    show('sec_done');
    L('★HP生成完了！');
  },2000);
});

document.getElementById('btn_genCopy').addEventListener('click',function(){
  L('コピー生成開始...');
  var payload={
    mode:'copywriting',industry:'美容・サロン',region:'埼玉県さいたま市',
    companyName:'Belle',appeal:'リピート率90%',
    strengths:'創業15年。丁寧なカウンセリング。リピート率90%超。'
  };
  L('fetch送信: '+JSON.stringify(payload));

  fetch(WK,{
    method:'POST',
    headers:{'Content-Type':'application/json'},
    body:JSON.stringify(payload)
  })
  .then(function(r){
    L('response status: '+r.status);
    return r.json();
  })
  .then(function(d){
    L('d.result type: '+typeof d.result);
    L('d.result (first 100): '+String(d.result).substring(0,100));

    var raw=d.result;
    if(typeof raw==='object')raw=JSON.stringify(raw);
    raw=raw.replace(/```json|```/g,'').trim();
    L('raw after clean (first 100): '+raw.substring(0,100));

    var data=JSON.parse(raw);
    L('parse OK, patterns count: '+(data.patterns||[]).length);

    var pl=document.getElementById('patList');
    pl.innerHTML='';
    var patterns=data.patterns||[];

    patterns.forEach(function(p,idx){
      L('カード生成: idx='+idx+' catch='+p.catch);
      var div=document.createElement('div');
      div.className='cpcard';
      div.textContent='パターン'+(idx+1)+': '+p.catch;

      (function(pattern,index){
        div.addEventListener('click',function(){
          L('★カードクリック! index='+index+' catch='+pattern.catch);
          document.querySelectorAll('#patList .cpcard').forEach(function(c){c.classList.remove('on');});
          div.classList.add('on');
          cpData={id:pattern.id,catch:pattern.catch,sub:pattern.sub};
          L('cpData設定: '+JSON.stringify(cpData));
          show('sec_genBtn');
          L('sec_genBtn表示完了');
          // sec_genBtnのdisplayを確認
          var el=document.getElementById('sec_genBtn');
          L('sec_genBtnのdisplay: '+window.getComputedStyle(el).display);
          L('btn_genHPの存在: '+(document.getElementById('btn_genHP')?'あり':'なし'));
        });
      })(p,idx);

      pl.appendChild(div);
    });

    show('sec_copyPats');
    L('コピーパターン表示完了');
  })
  .catch(function(e){
    L('ERROR: '+e.message);
    L('stack: '+e.stack);
  });
});

L('初期化完了');
L('btn_genHP存在確認: '+(document.getElementById('btn_genHP')?'あり':'なし'));
</script>
</body>
</html>
